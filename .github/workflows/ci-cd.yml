name: DrukNest CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/druknest-app
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1 — All parallel, no dependencies
  # secret-scan + test + trivy-fs run at the same time
  # ─────────────────────────────────────────────────────────────────────────────

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: HEAD

      - name: Alert on secret detection
        if: failure()
        run: |
          echo "PIPELINE BLOCKED: Secrets detected in commit history!"
          echo "  1. Remove the secret from code"
          echo "  2. Rotate the exposed credential immediately"
          echo "  3. Scrub history with git-filter-repo"
          exit 1

  test:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test --if-present
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2 — SonarQube (waits for test results/coverage)
  # ─────────────────────────────────────────────────────────────────────────────

  sonarqube:
    name: SonarQube Code Quality
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('sonar-project.properties') }}
          restore-keys: ${{ runner.os }}-sonar-

      - uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3 — Build Docker image (after all checks pass)
  # Uses Dockerfile.prod so GHA layer cache is shared with the push step
  # ─────────────────────────────────────────────────────────────────────────────

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [secret-scan, test, trivy-fs, sonarqube]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=${{ github.ref_name }}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4 — Scan the built image
  # ─────────────────────────────────────────────────────────────────────────────

  trivy-docker:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    needs: build-docker
    permissions:
      security-events: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - run: docker load --input /tmp/image.tar

      - uses: aquasecurity/trivy-action@0.28.0
        with:
          input: /tmp/image.tar
          format: sarif
          output: trivy-docker-results.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-docker-results.sarif
          category: trivy-docker

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5 — Push to Docker Hub (main only)
  # All layers already in GHA cache from build-docker → push is fast (~30s build)
  # ─────────────────────────────────────────────────────────────────────────────

  push-docker:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: trivy-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-
            type=raw,value=latest

      - name: Push image (GHA layer cache hit — build is ~30s)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6 — Deploy to Render (main only)
  # ─────────────────────────────────────────────────────────────────────────────

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: push-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            --fail --silent --show-error
          echo "Deploy hook triggered."

      - name: Wait for deployment to start
        run: sleep 30

      - name: Verify deployment is live
        run: |
          URL="${{ secrets.RENDER_DEPLOYMENT_URL }}"
          for i in {1..6}; do
            if curl -f -s -o /dev/null "$URL/health" || curl -f -s -o /dev/null "$URL"; then
              echo "Deployment live on attempt $i."
              exit 0
            fi
            echo "Attempt $i/6 — retrying in 10s..."
            sleep 10
          done
          echo "Deployment verification failed after 6 attempts."
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7 — OWASP ZAP DAST scan (main only, non-blocking)
  # ─────────────────────────────────────────────────────────────────────────────

  owasp-zap-scan:
    name: OWASP ZAP Dynamic Security Scan
    runs-on: ubuntu-latest
    needs: deploy-render
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true
    permissions:
      contents: read
      actions: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment readiness
        run: |
          URL="${{ secrets.RENDER_DEPLOYMENT_URL }}"
          for i in {1..15}; do
            if curl -f -s "$URL" > /dev/null 2>&1; then
              echo "Deployment is ready!"
              exit 0
            fi
            echo "Attempt $i/15 — waiting 10s..."
            sleep 10
          done
          echo "Not responding — proceeding with scan anyway."

      - uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ secrets.RENDER_DEPLOYMENT_URL }}
          artifact_name: zap-baseline-report
          cmd_options: '-a'
          fail_action: false
          allow_issue_writing: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Final — Pipeline status summary
  # ─────────────────────────────────────────────────────────────────────────────

  pipeline-status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [deploy-render, owasp-zap-scan]
    if: always()
    steps:
      - name: Report pipeline result
        run: |
          DEPLOY="${{ needs.deploy-render.result }}"
          if [ "$DEPLOY" == "failure" ]; then
            echo "Pipeline FAILED at deployment stage."
            exit 1
          fi
          echo "DrukNest CI/CD Pipeline completed!"
          echo ""
          echo "  Stage 1: Secret Scan + Test + Trivy FS  (parallel) ✓"
          echo "  Stage 2: SonarQube Code Quality                     ✓"
          echo "  Stage 3: Build Docker Image                         ✓"
          echo "  Stage 4: Trivy Docker Image Scan                    ✓"
          echo "  Stage 5: Push to Docker Hub              (main)     ${{ needs.deploy-render.result != 'skipped' && '✓' || '—' }}"
          echo "  Stage 6: Deploy to Render                (main)     $DEPLOY"
          echo "  Stage 7: OWASP ZAP DAST Scan            (main)     ${{ needs.owasp-zap-scan.result }}"
