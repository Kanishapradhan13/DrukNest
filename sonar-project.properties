sonar.projectKey=DrukNest
sonar.projectName=DrukNest
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/coverage/**,\
  **/*.d.ts,\
  **/vite.config.*,\
  **/tailwind.config.*,\
  **/postcss.config.*

sonar.cpd.exclusions=**/*.test.*,**/*.spec.*

# Exclude large UI page files from security taint analysis only.
# These are React render files — the JsSecuritySensorV2 dataflow analysis
# hangs on files >500 lines. Regular code quality still runs on all files.
sonar.security.sources.excludes=\
  src/pages/CustomerDashboard.tsx,\
  src/pages/OwnerDashboard.tsx,\
  src/pages/ListingDetail.tsx,\
  src/pages/RoommateFinder.tsx,\
  src/pages/AdminConsole.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Do not block the pipeline waiting for quality gate result
sonar.qualitygate.wait=false
