sonar.projectKey=DrukNest
sonar.projectName=DrukNest
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/coverage/**,\
  **/*.d.ts,\
  **/vite.config.*,\
  **/tailwind.config.*,\
  **/postcss.config.*

sonar.cpd.exclusions=**/*.test.*,**/*.spec.*

# Exclude large React render files from JsSecuritySensorV2 taint analysis.
# These files are pure UI — no user input reaches a sink. The Jasmin engine
# times out on them because taint graphs explode on large JSX trees.
# Standard code-quality rules (bugs, smells, duplication) still run on all files.
sonar.security.sources.excludes=\
  src/pages/CustomerDashboard.tsx,\
  src/pages/OwnerDashboard.tsx,\
  src/pages/ListingDetail.tsx,\
  src/pages/RoommateFinder.tsx,\
  src/pages/AdminConsole.tsx,\
  src/pages/AddProperty.tsx,\
  src/pages/Home.tsx,\
  src/pages/Listings.tsx,\
  src/pages/OwnerAccount.tsx,\
  src/components/Nav.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Do not block the pipeline waiting for quality gate result
sonar.qualitygate.wait=false
