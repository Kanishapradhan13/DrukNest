sonar.projectKey=DrukNest
sonar.projectName=DrukNest
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/coverage/**,\
  **/*.d.ts,\
  **/vite.config.*,\
  **/tailwind.config.*,\
  **/postcss.config.*

sonar.cpd.exclusions=**/*.test.*,**/*.spec.*

# Limit JsSecuritySensorV2 (Jasmin) taint analysis to files that actually
# handle user input flowing to a sink (auth, DB, messaging).
# All other files are pure render/display with no taint paths.
# Code-quality rules (bugs, smells, duplication) still run on ALL files.
sonar.security.sources.excludes=\
  src/pages/CustomerDashboard.tsx,\
  src/pages/OwnerDashboard.tsx,\
  src/pages/ListingDetail.tsx,\
  src/pages/RoommateFinder.tsx,\
  src/pages/AdminConsole.tsx,\
  src/pages/AddProperty.tsx,\
  src/pages/Home.tsx,\
  src/pages/Listings.tsx,\
  src/pages/OwnerAccount.tsx,\
  src/components/Nav.tsx,\
  src/components/Icons.tsx,\
  src/components/Thumb.tsx,\
  src/components/Card.tsx,\
  src/components/ConfirmDialog.tsx,\
  src/components/Skeleton.tsx,\
  src/components/Footer.tsx,\
  src/contexts/ToastContext.tsx,\
  src/lib/data.ts,\
  src/lib/types.ts,\
  src/pages/HowItWorks.tsx,\
  src/App.tsx,\
  src/main.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Do not block the pipeline waiting for quality gate result
sonar.qualitygate.wait=false
