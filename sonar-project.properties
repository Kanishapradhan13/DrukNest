sonar.projectKey=DrukNest
sonar.projectName=DrukNest
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/coverage/**,\
  **/*.d.ts,\
  **/vite.config.*,\
  **/tailwind.config.*,\
  **/postcss.config.*

sonar.cpd.exclusions=**/*.test.*,**/*.spec.*

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Do not block the pipeline waiting for the quality gate — prevents 15-min hangs
sonar.qualitygate.wait=false
